<!DOCTYPE html>
<html>
<head>
  <title>Dylan Dino Runner</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦖</text></svg>">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.2s;
    }

    #ui {
      width: 800px;
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    canvas {
      border: 2px solid #333;
      background: white;
    }

    #signature {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(0,0,0,0.6);
    }

    #logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 80px;
      height: 80px;
      z-index: 9999;
      background: white;
      border: 2px solid #333;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<canvas id="logo" width="80" height="80"></canvas>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="high">0</span></div>
</div>

<canvas id="game" width="800" height="300"></canvas>

<div id="signature">Made by Dylan Fortune</div>

<audio id="bgmusic" loop>
  <source src="bb7a8fe7-a907-4d9e-9d6d-60dd415461fd.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let highScore = localStorage.getItem("dylanHigh") || 0;
let speed = 5;

let gameRunning = true;
let paused = false;

document.getElementById("high").innerText = highScore;

// AUDIO
const music = document.getElementById("bgmusic");
let started = false;
document.addEventListener("keydown", () => {
  if (!started) {
    started = true;
    music.volume = 0.4;
    music.play().catch(()=>{});
  }
});

// PLAYER
const player = {
  x: 60,
  y: 220,
  r: 12,
  vy: 0,
  jumping: false
};

const obstacles = [];
const gravity = 0.8;

// LOGO
const logo = document.getElementById("logo");
const lctx = logo.getContext("2d");

function drawLogo() {
  lctx.clearRect(0, 0, 80, 80);

  lctx.fillStyle = "#00c853";
  lctx.fillRect(20, 40, 30, 18);
  lctx.fillRect(42, 25, 18, 14);
  lctx.fillRect(10, 48, 10, 8);
  lctx.fillRect(25, 58, 6, 10);
  lctx.fillRect(38, 58, 6, 10);

  lctx.fillStyle = "black";
  lctx.fillRect(50, 30, 3, 3);

  requestAnimationFrame(drawLogo);
}
drawLogo();

// INPUT
document.addEventListener("keydown", e => {
  if (e.code === "Space" && !player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
});

// BUGATTI DINO
function drawDino(x, y) {
  ctx.fillStyle = "#1565c0";
  ctx.fillRect(x, y + 10, 50, 15);
  ctx.fillRect(x + 10, y, 30, 15);

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(x + 10, y + 28, 6, 0, Math.PI * 2);
  ctx.arc(x + 40, y + 28, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#1b5e20";
  ctx.fillRect(x + 25, y - 10, 12, 10);

  ctx.fillStyle = "black";
  ctx.fillRect(x + 32, y - 7, 2, 2);
}

// NYAN CAT
function drawNyan(o) {
  o.anim += 0.15;

  const colors = ["#ff0000","#ff9900","#ffff00","#00ff00","#00ccff","#cc00ff"];

  for (let i = 0; i < colors.length; i++) {
    ctx.fillStyle = colors[(i + Math.floor(o.anim)) % colors.length];
    ctx.fillRect(o.x - 12 + i * 4, o.y - 10, 6, 6);
  }

  ctx.fillStyle = "pink";
  ctx.fillRect(o.x - 5, o.y - 5, 14, 10);

  ctx.fillStyle = "black";
  ctx.fillRect(o.x - 2, o.y - 2, 2, 2);
  ctx.fillRect(o.x + 4, o.y - 2, 2, 2);
}

// SPAWN
function spawnObstacle() {
  if (paused) return;

  const last = obstacles[obstacles.length - 1];
  if (last && last.x > 650) return;

  obstacles.push({
    x: 800,
    y: 240,
    r: 12,
    anim: 0
  });
}
setInterval(spawnObstacle, 1200);

// COLLISION
function circleCollision(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy < (a.r + b.r) * (a.r + b.r);
}

// UPDATE
function update() {
  player.vy += gravity;
  player.y += player.vy;

  if (player.y >= 220) {
    player.y = 220;
    player.vy = 0;
    player.jumping = false;
  }

  for (let o of obstacles) {
    o.x -= speed;

    if (circleCollision(player, o)) {
      location.reload();
    }
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].x < -50) {
      obstacles.splice(i, 1);
      score++;
      document.getElementById("score").innerText = score;
    }
  }
}

// DRAW
function draw() {
  ctx.clearRect(0, 0, 800, 300);

  drawDino(player.x, player.y);

  for (let o of obstacles) {
    drawNyan(o);
  }
}

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
