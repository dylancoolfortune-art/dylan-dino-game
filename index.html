<!DOCTYPE html>
<html>
<head>
  <title>Dylan Dino Runner</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦖</text></svg>">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.2s;
    }

    #ui {
      width: 800px;
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    canvas {
      border: 2px solid #333;
      background: white;
    }

    #signature {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(0,0,0,0.6);
    }

    #logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 80px;
      height: 80px;
      z-index: 9999;
      background: white;
      border: 2px solid #333;
      border-radius: 8px;
    }

    #gameOver {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 24px;
      z-index: 20;
    }

    #speedPopup {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
      z-index: 999;
    }

    #speedPopup img {
      width: 320px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- 🦖 LOGO -->
<canvas id="logo" width="80" height="80"></canvas>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="high">0</span></div>
</div>

<canvas id="game" width="800" height="300"></canvas>

<div id="signature">Made by Dylan Fortune</div>

<div id="gameOver">
  <div id="finalText"></div>
  <button onclick="restart()">Restart</button>
</div>

<div id="speedPopup">
  <img src="speed.png">
</div>

<audio id="bgmusic" loop>
  <source src="bb7a8fe7-a907-4d9e-9d6d-60dd415461fd.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let highScore = localStorage.getItem("dylanHigh") || 0;
let speed = 5;

let gameRunning = true;
let paused = false;

let disco = false;
let discoTimer = 0;

let speedEventTriggered = false;

document.getElementById("high").innerText = highScore;

// 🔊 AUDIO FIX
const music = document.getElementById("bgmusic");
let musicStarted = false;

document.addEventListener("keydown", () => {
  if (!musicStarted) {
    musicStarted = true;
    music.volume = 0.4;
    music.play().catch(() => {});
  }
});

// 🦖 PLAYER
const player = {
  x: 60,
  y: 220,
  r: 12,
  vy: 0,
  jumping: false
};

const obstacles = [];
const gravity = 0.8;

// ================= LOGO =================
const logo = document.getElementById("logo");
const lctx = logo.getContext("2d");

function drawLogo() {
  lctx.clearRect(0, 0, 80, 80);

  lctx.fillStyle = "#00c853";
  lctx.fillRect(20, 40, 30, 18);
  lctx.fillRect(42, 25, 18, 14);
  lctx.fillRect(10, 48, 10, 8);
  lctx.fillRect(25, 58, 6, 10);
  lctx.fillRect(38, 58, 6, 10);

  lctx.fillStyle = "black";
  lctx.fillRect(50, 30, 3, 3);

  requestAnimationFrame(drawLogo);
}

drawLogo();

// ================= INPUT =================
document.addEventListener("keydown", e => {
  if (!gameRunning || paused) return;

  if (e.code === "Space" && !player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
});

// ================= OBSTACLES =================
function spawnObstacle() {
  if (!gameRunning || paused) return;

  const last = obstacles[obstacles.length - 1];
  if (last && last.x > 650) return;

  obstacles.push({
    x: 800,
    y: 240,
    r: 12,
    anim: 0
  });
}

setInterval(spawnObstacle, 1200);

// ================= DISCO =================
function startDisco() {
  disco = true;
  discoTimer = 1200;
  speed += 2;
}

function updateDisco() {
  if (!disco) return;

  discoTimer--;

  const colors = ["#ff00ff","#00ffff","#ffff00","#ff0000","#00ff00"];
  document.body.style.background = colors[Math.floor(Math.random()*colors.length)];

  if (discoTimer <= 0) {
    disco = false;
    document.body.style.background = "#f4f4f4";
  }
}

// ================= DRAW =================
function drawDino(x, y) {
  ctx.fillStyle = "#1b5e20";

  ctx.fillRect(x, y, 28, 18);
  ctx.fillRect(x + 18, y - 10, 18, 14);
  ctx.fillRect(x - 10, y + 5, 10, 8);
  ctx.fillRect(x + 4, y + 18, 6, 12);
  ctx.fillRect(x + 18, y + 18, 6, 12);

  ctx.fillStyle = "black";
  ctx.fillRect(x + 28, y - 6, 3, 3);
}

function drawNyan(o) {
  o.anim += 0.15;

  const colors = ["#ff0055","#ff66cc","#ffcc00","#00ccff","#ff3300"];

  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = colors[(i + Math.floor(o.anim)) % colors.length];
    ctx.fillRect(o.x - 10 + i * 6, o.y - 10, 8, 8);
  }

  ctx.fillStyle = "white";
  ctx.fillRect(o.x - 5, o.y - 2, 4, 4);
  ctx.fillRect(o.x + 5, o.y - 2, 4, 4);
}

// ================= COLLISION =================
function circleCollision(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy < (a.r + b.r) * (a.r + b.r);
}

// ================= GAME OVER =================
function gameOver() {
  gameRunning = false;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("dylanHigh", highScore);
  }

  document.getElementById("high").innerText = highScore;
  document.getElementById("finalText").innerText = "Game Over! Score: " + score;
  document.getElementById("gameOver").style.display = "flex";
}

// ================= RESTART =================
function restart() {
  score = 0;
  speed = 5;

  gameRunning = true;
  paused = false;

  player.y = 220;
  player.vy = 0;
  player.jumping = false;

  obstacles.length = 0;

  disco = false;
  discoTimer = 0;
  speedEventTriggered = false;

  document.body.style.background = "#f4f4f4";
  document.getElementById("gameOver").style.display = "none";
  document.getElementById("score").innerText = 0;
}

// ================= UPDATE =================
function update() {

  if (paused || !gameRunning) return;

  updateDisco();

  player.vy += gravity;
  player.y += player.vy;

  if (player.y >= 220) {
    player.y = 220;
    player.vy = 0;
    player.jumping = false;
  }

  for (let i = 0; i < obstacles.length; i++) {
    obstacles[i].x -= speed;

    if (circleCollision(player, obstacles[i])) {
      gameOver();
    }
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].x < -50) {
      obstacles.splice(i, 1);

      score++;
      document.getElementById("score").innerText = score;

      if (score === 100 && !speedEventTriggered) {
        speedEventTriggered = true;
      }

      if (score % 20 === 0) startDisco();
      if (score % 5 === 0) speed += 0.5;
    }
  }
}

// ================= LOOP =================
function draw() {
  ctx.clearRect(0, 0, 800, 300);

  drawDino(player.x, player.y);

  for (let o of obstacles) {
    drawNyan(o);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
