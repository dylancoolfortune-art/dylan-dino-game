<!DOCTYPE html>
<html>
<head>
  <title>Dylan Dino Runner</title>

  <!-- 🦖 TAB LOGO -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦖</text></svg>">

  <style>
    body {
      margin:0;
      overflow:hidden;
      font-family:Arial;
      background:#f4f4f4;
      display:flex;
      flex-direction:column;
      align-items:center;
      transition:0.2s;
    }

    #ui {
      width:800px;
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-weight:bold;
    }

    canvas {
      border:2px solid #333;
      background:white;
    }

    #logo {
      position:absolute;
      top:10px;
      right:10px;
      width:80px;
      height:80px;
      border:2px solid #333;
      background:white;
    }

    #signature {
      margin-top:8px;
      font-size:14px;
      color:rgba(0,0,0,0.6);
    }

    #speedPopup {
      position:absolute;
      width:100%;
      height:100%;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.85);
    }

    #bossBarWrap {
      width:800px;
      display:none;
      margin-top:10px;
    }

    #bossBar {
      height:10px;
      background:red;
      width:100%;
    }
  </style>
</head>

<body>

<!-- 🦖 LOGO -->
<canvas id="logo" width="80" height="80"></canvas>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>❤️ <span id="hearts">❤️❤️❤️❤️</span></div>
</div>

<div id="bossBarWrap">
  Boss HP
  <div style="background:#ccc;">
    <div id="bossBar"></div>
  </div>
</div>

<canvas id="game" width="800" height="300"></canvas>

<div id="signature">Made by Dylan Fortune</div>

<div id="speedPopup">
  <img src="speed.png">
</div>

<audio id="bgmusic" loop>
  <source src="bb7a8fe7-a907-4d9e-9d6d-60dd415461fd.mp3">
</audio>

<script>

// ================= CORE =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let speed = 5;

let bossMode = false;
let bossHP = 20;
let maxBossHP = 20;

let hearts = 4;

let paused = false;
let cutsceneDone = false;

let disco = false;
let discoTimer = 0;

const player = {
  x:60,
  y:220,
  r:12,
  vy:0,
  jumping:false
};

const obstacles = [];
const gravity = 0.8;

// ================= AUDIO =================
const music = document.getElementById("bgmusic");
let started=false;

document.addEventListener("keydown",()=>{
  if(!started){
    started=true;
    music.volume=0.4;
    music.play().catch(()=>{});
  }
});

// ================= LOGO =================
const logo = document.getElementById("logo");
const lctx = logo.getContext("2d");

function drawLogo(){
  lctx.clearRect(0,0,80,80);

  lctx.fillStyle="#00c853";
  lctx.fillRect(20,40,30,18);
  lctx.fillRect(42,25,18,14);
  lctx.fillRect(10,48,10,8);

  lctx.fillStyle="black";
  lctx.fillRect(50,30,3,3);

  requestAnimationFrame(drawLogo);
}
drawLogo();

// ================= INPUT =================
document.addEventListener("keydown",e=>{
  if(e.code==="Space" && !player.jumping){
    player.vy=-12;
    player.jumping=true;
  }
});

// ================= CUTSCENE =================
function triggerCutscene(){
  paused=true;
  document.getElementById("speedPopup").style.display="flex";

  setTimeout(()=>{
    document.getElementById("speedPopup").style.display="none";
    paused=false;
    startBossMode();
  },4000);
}

// ================= BOSS START =================
function startBossMode(){
  bossMode=true;
  speed=3;

  hearts=4;
  updateHearts();

  bossHP=maxBossHP;
  updateBossBar();

  document.getElementById("bossBarWrap").style.display="block";
}

// ================= DISCO MODE =================
function startDisco(){
  disco=true;
  discoTimer=1200;
  speed+=2;
}

function updateDisco(){
  if(!disco) return;

  discoTimer--;

  const colors=["#ff00ff","#00ffff","#ffff00","#ff0000","#00ff00"];
  document.body.style.background=colors[Math.floor(Math.random()*colors.length)];

  if(discoTimer<=0){
    disco=false;
    document.body.style.background="#f4f4f4";
  }
}

// ================= PLAYER (BUGATTI + HEAD) =================
function drawPlayer(){

  ctx.fillStyle="#1565c0";
  ctx.fillRect(player.x,player.y+10,50,15);
  ctx.fillRect(player.x+10,player.y,30,15);

  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(player.x+10,player.y+28,6,0,Math.PI*2);
  ctx.arc(player.x+40,player.y+28,6,0,Math.PI*2);
  ctx.fill();

  // dino head
  ctx.fillStyle="#1b5e20";
  ctx.fillRect(player.x+28,player.y-12,12,12);
}

// ================= NYAN =================
function drawNyan(o){

  o.anim=(o.anim||0)+0.15;

  const colors=["#ff0000","#ff9900","#ffff00","#00ff00","#00ccff","#cc00ff"];

  for(let i=0;i<6;i++){
    ctx.fillStyle=colors[(i+Math.floor(o.anim))%colors.length];
    ctx.fillRect(o.x-12+i*4,o.y-10,6,6);
  }

  ctx.fillStyle="pink";
  ctx.fillRect(o.x-5,o.y-5,14,10);
}

// ================= BOSS NYAN CAT (FIXED LOOK) =================
function drawBoss(){

  const x=620, y=140;

  const colors=["#ff0000","#ff9900","#ffff00","#00ff00","#00ccff","#cc00ff"];

  for(let i=0;i<10;i++){
    ctx.fillStyle=colors[i%colors.length];
    ctx.fillRect(x+i*8,y+20,10,10);
  }

  ctx.fillStyle="pink";
  ctx.fillRect(x+80,y,60,40);

  ctx.fillRect(x+70,y-10,30,30);

  ctx.fillStyle="black";
  ctx.fillRect(x+75,y-2,3,3);
  ctx.fillRect(x+85,y-2,3,3);
}

// ================= COLLISION =================
function collide(a,b){
  let dx=a.x-b.x;
  let dy=a.y-b.y;
  return dx*dx+dy*dy < (a.r+b.r)*(a.r+b.r);
}

// ================= SPAWN =================
function spawn(){
  if(paused) return;

  const last=obstacles[obstacles.length-1];
  if(last && last.x>650) return;

  obstacles.push({
    x:800,
    y:240,
    r:12,
    speed: bossMode ? (3+Math.random()*3) : speed,
    passed:false,
    anim:0
  });
}
setInterval(spawn,1200);

// ================= UPDATE =================
function update(){

  if(paused) return;

  updateDisco();

  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>=220){
    player.y=220;
    player.vy=0;
    player.jumping=false;
  }

  for(let o of obstacles){
    o.x-=o.speed;

    if(collide(player,o)){
      if(bossMode){
        hearts=Math.max(0,hearts-1);
        updateHearts();
        o.x=-100;

        if(hearts===0){
          alert("Game Over!");
          location.reload();
        }
      } else {
        location.reload();
      }
    }

    if(bossMode && !o.passed && o.x<player.x){
      o.passed=true;
      bossHP--;
      updateBossBar();

      if(bossHP<=0){
        bossMode=false;
      }
    }
  }

  for(let i=obstacles.length-1;i>=0;i--){
    if(obstacles[i].x<-50){
      obstacles.splice(i,1);

      if(!bossMode){
        score++;
        document.getElementById("score").innerText=score;

        if(score===100 && !cutsceneDone){
          cutsceneDone=true;
          triggerCutscene();
        }

        if(score%20===0) startDisco();
      }
    }
  }
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,800,300);

  drawPlayer();

  for(let o of obstacles){
    drawNyan(o);
  }

  if(bossMode) drawBoss();

  if(!bossMode && bossHP<=0){
    ctx.fillStyle="gold";
    ctx.fillRect(player.x+70,player.y,15,20);
  }
}

// ================= UI =================
function updateHearts(){
  document.getElementById("hearts").innerText="❤️".repeat(hearts);
}

function updateBossBar(){
  let percent=(bossHP/maxBossHP)*100;
  document.getElementById("bossBar").style.width=percent+"%";
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
